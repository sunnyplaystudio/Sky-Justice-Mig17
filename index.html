<!DOCTYPE html>
<html lang="en" translate="no">
<head>
<meta charset="UTF-8">
<meta name="google" content="notranslate">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MIG 17 - Operation Thunder</title>
<style>
    body { margin:0; overflow:hidden; background:#2980b9; font-family: 'Arial Black', sans-serif; touch-action:none; user-select:none; }
    canvas { display:block; cursor: crosshair; }
    
    /* UI Design - Non-translatable */
    #ui {
        position:absolute; top:20px; width:100%; display:flex; 
        justify-content:space-around; color:white; font-size:24px; 
        pointer-events:none; z-index:10; text-shadow: 2px 2px 5px #000;
    }
    
    #controls { position:absolute; top:20px; left:20px; z-index:20; }
    .btn {
        font-size:18px; padding:10px; border-radius:50%; width:50px; height:50px;
        border:none; background:rgba(0, 0, 0, 0.5); color:white; cursor:pointer;
        display: flex; align-items: center; justify-content: center;
    }

    #overlay {
        position: absolute; top:0; left:0; width:100%; height:100%;
        display:none; justify-content:center; align-items:center;
        background: rgba(0,0,0,0.7); z-index:100; cursor: pointer;
        flex-direction: column;
    }
    #msg { color: #ff4b2b; font-size: 80px; font-weight:900; text-shadow: 0 0 30px #000; margin-bottom: 20px; }
    #sub-msg { color: white; font-size: 20px; }
</style>
</head>
<body translate="no" class="notranslate">

<div id="ui" class="notranslate">
    <div>SCORE: <span id="scoreDisplay">0</span></div>
    <div>BEST: <span id="bestDisplay">0</span></div>
</div>

<div id="controls">
    <button class="btn" onclick="togglePause()">⏸</button>
</div>

<div id="overlay" onclick="resetGame()">
    <div id="msg">GAME OVER</div>
    <div id="sub-msg">TAP TO RESTART</div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const overlay = document.getElementById("overlay");
const scoreDisplay = document.getElementById("scoreDisplay");
const bestDisplay = document.getElementById("bestDisplay");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// --- ASSET CONFIGURATION (Using your original filenames) ---
const images = {};
const config = {
    'mig': 'mig.png',
    'enemy_franco': 'enemy_franco.png',
    'hhh': 'hhh.png',
    'trump': 'enemy_trump.png',
    'netanyahu': 'enemy_netanyahu.png',
    'fc': 'fc.png',
    'fj': 'fj.png',
    'h': 'h.png',
    'hl': 'hl.png',
    'ba': 'ba.png',
    'b': 'b.png',
    'ufo': 'ufo.png'
};

const pointsMap = { 'enemy_franco': 25, 'hhh': 15, 'trump': 20, 'netanyahu': 20, 'fc': 15, 'fj': 15, 'h': 10, 'hl': 10, 'ba': 5, 'b': 5, 'ufo': 10 };

Object.keys(config).forEach(key => {
    images[key] = new Image();
    images[key].src = config[key];
});

// --- GAME STATE ---
let game = {
    active: true,
    paused: false,
    score: 0,
    best: localStorage.getItem("mig_best_score") || 0,
    playerX: window.innerWidth / 2,
    bullets: [],
    enemies: [],
    clouds: [],
    popups: [],
    lastSpawn: 0
};

bestDisplay.innerText = game.best;

// --- CONTROLS ---
function togglePause() {
    game.paused = !game.paused;
    document.querySelector('.btn').innerText = game.paused ? "▶" : "⏸";
}

window.addEventListener('mousemove', e => { if(!game.paused) game.playerX = e.clientX; });
window.addEventListener('touchmove', e => { 
    if(!game.paused) game.playerX = e.touches[0].clientX; 
    e.preventDefault(); 
}, {passive: false});

window.addEventListener('mousedown', () => { if(game.active && !game.paused) shoot(); });
window.addEventListener('touchstart', () => { if(game.active && !game.paused) shoot(); });

function shoot() {
    game.bullets.push({ x: game.playerX, y: canvas.height - 180 });
    new Audio("shoot.mp3").play().catch(()=>{});
}

function resetGame() {
    game.active = true;
    game.score = 0;
    game.enemies = [];
    game.bullets = [];
    game.popups = [];
    overlay.style.display = "none";
    scoreDisplay.innerText = "0";
}

function endGame() {
    game.active = false;
    overlay.style.display = "flex";
    if (game.score > game.best) {
        game.best = game.score;
        localStorage.setItem("mig_best_score", game.best);
        bestDisplay.innerText = game.best;
    }
}

// --- MAIN LOOP ---
function loop(time) {
    if (!game.paused) {
        // Cloud Animation
        if (Math.random() < 0.01) game.clouds.push({x: Math.random()*canvas.width, y: -100});
        game.clouds.forEach((c, i) => {
            c.y += 1.5;
            if(c.y > canvas.height + 100) game.clouds.splice(i, 1);
        });

        if (game.active) {
            // Spawning
            let rate = game.score >= 1000 ? 700 : 1000;
            if (time - game.lastSpawn > rate) {
                const pool = Object.keys(pointsMap);
                const type = pool[Math.floor(Math.random() * pool.length)];
                game.enemies.push({
                    x: Math.random() * (canvas.width - 100) + 50,
                    y: -100,
                    type: type,
                    speed: 3 + Math.random() * 2 + (game.score / 2500)
                });
                game.lastSpawn = time;
            }

            // Bullet Movement
            game.bullets.forEach((b, i) => {
                b.y -= 15;
                if(b.y < -50) game.bullets.splice(i, 1);
            });

            // Collisions
            game.enemies.forEach((e, ei) => {
                e.y += e.speed;
                
                game.bullets.forEach((b, bi) => {
                    if (Math.abs(b.x - e.x) < 50 && Math.abs(b.y - e.y) < 50) {
                        let p = pointsMap[e.type];
                        game.score += p;
                        scoreDisplay.innerText = game.score;
                        game.popups.push({ x: e.x, y: e.y, t: "+" + p, life: 25 });
                        new Audio("explosion.mp3").play().catch(()=>{});
                        game.enemies.splice(ei, 1);
                        game.bullets.splice(bi, 1);
                    }
                });

                if (Math.abs(game.playerX - e.x) < 60 && Math.abs((canvas.height-150) - e.y) < 70) {
                    endGame();
                }
                if (e.y > canvas.height + 100) game.enemies.splice(ei, 1);
            });
        }
    }

    // --- RENDER ---
    ctx.fillStyle = game.score >= 1000 ? "#1a2a3a" : "#2980b9";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.font = "60px Arial";
    game.clouds.forEach(c => ctx.fillText("☁️", c.x, c.y));

    game.bullets.forEach(b => {
        ctx.font = "30px Arial";
        ctx.fillText("🚀", b.x - 15, b.y);
    });

    game.enemies.forEach(e => {
        let img = images[e.type];
        if(img.complete && img.naturalWidth > 0) ctx.drawImage(img, e.x - 45, e.y - 45, 90, 90);
        else { ctx.font = "40px Arial"; ctx.fillText("👾", e.x - 20, e.y + 20); }
    });

    if (game.active) {
        let pImg = images['mig'];
        if(pImg.complete && pImg.naturalWidth > 0) ctx.drawImage(pImg, game.playerX - 75, canvas.height - 230, 150, 200);
        else { ctx.font = "60px Arial"; ctx.fillText("✈️", game.playerX - 30, canvas.height - 150); }
    }

    ctx.font = "bold 35px sans-serif";
    ctx.fillStyle = "gold";
    game.popups.forEach((p, i) => {
        ctx.globalAlpha = p.life / 25;
        ctx.fillText(p.t, p.x, p.y);
        p.y -= 2; p.life--;
        if(p.life <= 0) game.popups.splice(i, 1);
    });
    ctx.globalAlpha = 1.0;

    requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
